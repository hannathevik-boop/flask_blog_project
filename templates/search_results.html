{% extends "base.html" %}

{% block content %}

<h2>Search results for "{{ query }}"</h2>

{% if posts %}

    {% for post in posts %}

        <div class="post-card">

            <h3>
                <a href="{{ url_for('post', post_id=post['id']) }}">
                    {{ post["title"] }}
                </a>
            </h3>

            <p>{{ post["body"][:200] }}...</p>

        </div>

    {% endfor %}

{% else %}

<p>No results found.</p>

{% endif %}

{% endblock %}
