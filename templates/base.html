<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="site-header">
    
    <h1><a href="{{ url_for('home') }}">Fotograf Hanna Thevik</a></h1>
</header>
<div class="container"></div>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
      {% for message in messages %}
        <div class="flash-message">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<hr>

{% block content %}
{% endblock %}

<hr>

<footer>
    <p>Fotograf Hanna Thevik</p>
</footer>
</div>
</body>
</html>
