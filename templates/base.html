<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Blogg</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<div class="container">

<header class="site-header">

    <h1>
        <a href="{{ url_for('home') }}">
            Alt kunne vore ein e-post
        </a>
    </h1>

    <h2>
        ei samling unødvendig djupe observasjonar
    </h2>

</header>

{% with messages = get_flashed_messages() %}
    {% if messages %}

        <div class="flash-container">

            {% for message in messages %}

                <div class="flash-message">
                    {{ message }}
                </div>

            {% endfor %}

        </div>

    {% endif %}
{% endwith %}

<hr>

{% block content %}
{% endblock %}

<hr>

<footer class="footer">
    <p>Hanna Thevik</p>
</footer>

</div>

</body>
</html>
