{% extends "base.html" %}

{% block content %}

<a href="/create">Create New Post</a>

{% for post in posts %}

<h2>
<a href="/post/{{post.id}}">
{{post.title}}
</a>
</h2>

<p>{{post.created}}</p>

<p>
{{post.body[:150]}}...
</p>

<p>
Tags:
{% for tag in (post.tags or "").split(",") %}
<a href="/tag/{{tag}}">{{tag}}</a>
{% endfor %}
</p>

<hr>

{% endfor %}

{% endblock %}
