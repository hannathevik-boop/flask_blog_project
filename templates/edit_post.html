{% extends "base.html" %}

{% block content %}

<h2>Rediger innlegg</h2>

<form method="POST">

<p>
<label>Tittel</label><br>
<input name="title" value="{{ post.title }}">
</p>

<p>
<label>Tekst</label><br>
<textarea name="body" rows="8">{{ post.body }}</textarea>
</p>

<p>
<label>Tags</label><br>
<input name="tags" value="{{ post.tags }}">
</p>

<p>
<button type="submit">Oppdater innlegg</button>
</p>


</form>

{% endblock %}
