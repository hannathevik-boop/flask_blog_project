{% extends "base.html" %}

{% block content %}

<h2>Create New Post</h2>

<form method="POST">

<label>Title</label>
<input name="title" required>

<label>Body</label>
<textarea name="body" required></textarea>

<label>Tags</label>
<input name="tags">

<button type="submit">Create Post</button>

</form>

{% endblock %}
